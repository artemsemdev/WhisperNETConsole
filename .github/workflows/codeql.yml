name: CodeQL

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze C#
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: ['csharp']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Build
        run: |
          dotnet restore src/VoxFlow.Core/VoxFlow.Core.csproj
          dotnet restore src/VoxFlow.Cli/VoxFlow.Cli.csproj
          dotnet restore src/VoxFlow.McpServer/VoxFlow.McpServer.csproj
          dotnet build src/VoxFlow.Core/VoxFlow.Core.csproj --no-restore
          dotnet build src/VoxFlow.Cli/VoxFlow.Cli.csproj --no-restore
          dotnet build src/VoxFlow.McpServer/VoxFlow.McpServer.csproj --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
